# ============================================
# Workflow Agent — Default Configuration
# ============================================
# Copy this file to .workflow-agent/config.yaml
# and adjust the values as needed.
#
# Configuration priority (highest wins):
#   Project (.workflow-agent/config.yaml) >
#   Global (~/.workflow-agent/config.yaml) >
#   Defaults (this file)

# --------------------------------------------------------------------------
# defaultProvider
# ---------------
# The AI agent provider to use when not specified in the workflow.
# Supported values:
#   "claude-code"  — Claude Code CLI (requires `claude` on PATH)
#   "codex"        — Codex CLI (requires `codex` on PATH)
# --------------------------------------------------------------------------
defaultProvider: "claude-code"

# --------------------------------------------------------------------------
# timeout
# -------
# Maximum time (in milliseconds) each agent call is allowed to run.
# When exceeded, the agent process is killed and the workflow continues.
#
#   300000 ms = 5 minutes
#   600000 ms = 10 minutes
#   900000 ms = 15 minutes
# --------------------------------------------------------------------------
timeout: 300000

# --------------------------------------------------------------------------
# maxParallel
# -----------
# Maximum number of agent calls that can run concurrently when using
# the parallel() runtime API. Higher values increase throughput but
# also increase resource usage (CPU, memory, API quota).
# --------------------------------------------------------------------------
maxParallel: 4

# --------------------------------------------------------------------------
# providers
# ---------
# Per-provider configuration. Each key is a provider name.
#
# commandPath: CLI 命令路径（可指定完整路径）
# args: CLI 参数列表，支持以下变量替换：
#   {prompt}  — 运行时传入的提示文本（必填）
#   {cwd}     — 当前工作目录
#   {output}  — schema 模式下的临时 JSON 输出文件路径
#
# 注意：prompt 变量必须包含在 args 中，否则无法正常工作。
# --------------------------------------------------------------------------
providers:
  claude-code:
    commandPath: "claude"
    args:
      - "--dangerously-skip-permissions"
      - "--bare"
      - "--setting-sources"
      - "user"
      - "-p"
      - "{prompt}"
  codex:
    commandPath: "codex"
    args:
      - "exec"
      - "{prompt}"
      - "--full-auto"
